stages:          
  - build

variables:
  CI_REGISTRY: registry.gitlab.com/learning3792551/first_pet


build-job:      
  stage: build
  image: docker:cli
  services:
  - docker:dind

  before_script:
      - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - echo "1/3 Building microservices date-server"
    - docker build -t $CI_REGISTRY/date-server:dev ./src/date-server/
    - echo "Pushing..."
    - docker push $CI_REGISTRY/date-server:dev

    

