apiVersion: apps/v1
kind: Deployment
metadata: 
  name: date-server-deployment
  labels:
    app: date-server
spec:
  replicas: 1
  selector:
    app : date-server
  template:
    metadata:
      labels:
        app : date-server
    spec:
      containers:
        - name: date-server
          image: registry.gitlab.com/learning3792551/first_pet/date-server
          ports: 
           - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: date-server-service
spec:
  selector: 
    app : date-server
  ports:
    - protocol: TCP
      port: 